name: Process Extracts

on:
  schedule:
    # Mondays 06:00 UTC. N-PORT-P filings drop quarterly with 60-day lag,
    # so weekly is generous; adjust to monthly once the universe is stable.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: process-extracts
  cancel-in-progress: false

env:
  TOTAL_SHARDS: 5

jobs:
  extract:
    name: Extract (shard ${{ matrix.shard }}/${{ vars.TOTAL_SHARDS || 5 }})
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Run pipeline shard
        env:
          EDGAR_USER_AGENT: ${{ secrets.EDGAR_USER_AGENT }}
          OPENFIGI_API_KEY: ${{ secrets.OPENFIGI_API_KEY }}
        run: |
          nix develop -c python -m pipeline.run_shard \
            --shard ${{ matrix.shard }} \
            --total-shards ${{ env.TOTAL_SHARDS }}

      - uses: actions/upload-artifact@v4
        with:
          name: extracts-shard-${{ matrix.shard }}
          path: data/snapshots/
          if-no-files-found: warn
          retention-days: 7

  commit:
    name: Sync to fund-extracts
    needs: extract
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: extracts-shard-*
          path: data/snapshots/
          merge-multiple: true

      - name: Inspect merged output
        run: |
          if [ ! -d data/snapshots ] || [ -z "$(ls -A data/snapshots 2>/dev/null)" ]; then
            echo "No data/snapshots produced — nothing to sync"
            exit 0
          fi
          echo "Files produced this run:"
          find data/snapshots -type f | head -20
          du -sh data/snapshots/

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build manifest
        env:
          EDGAR_USER_AGENT: ${{ secrets.EDGAR_USER_AGENT }}
        run: |
          nix develop -c python -m pipeline.build_manifest

      - name: Regenerate JSON Schemas from pydantic models
        run: |
          nix develop -c python -m pipeline.schemas

      - name: Check out fund-extracts (data repo)
        uses: actions/checkout@v4
        with:
          repository: vizfolio/fund-extracts
          ssh-key: ${{ secrets.FUND_DATA_REPO_DEPLOY_KEY }}
          path: fund-extracts

      - name: Sync and push to fund-extracts
        run: |
          # NOT using rsync --delete. A fund that fails its shard one
          # week would otherwise lose all its prior snapshots. We accept
          # some cruft accumulating in exchange for safety.
          mkdir -p fund-extracts/snapshots fund-extracts/schemas
          rsync -a data/snapshots/ fund-extracts/snapshots/
          cp data/funds.json fund-extracts/funds.json
          cp schemas/fund_snapshot.json schemas/funds_manifest.json fund-extracts/schemas/
          cd fund-extracts
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add snapshots/ funds.json schemas/
          if git diff --cached --quiet; then
            echo "No changes to commit to fund-extracts"
          else
            git commit -m "Update funds $(date -u +%Y-%m-%d)"
            git push
          fi

  securities:
    name: Refresh securities registry
    needs: commit
    runs-on: ubuntu-latest
    # First-run bootstrap of an empty registry takes ~15-20 min for
    # ~3,500 EDGAR calls. Steady-state runs are seconds (in-TTL cache).
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Check out fund-extracts (read-only, source of CIKs)
        uses: actions/checkout@v4
        with:
          repository: vizfolio/fund-extracts
          path: fund-extracts

      - name: Check out securities-extracts (read-write, target)
        uses: actions/checkout@v4
        with:
          repository: vizfolio/securities-extracts
          ssh-key: ${{ secrets.SECURITIES_REPO_DEPLOY_KEY }}
          path: securities-extracts

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build/refresh securities registry
        env:
          EDGAR_USER_AGENT: ${{ secrets.EDGAR_USER_AGENT }}
        run: |
          nix develop -c python -m pipeline.securities.build_registry \
            --fund-snapshots fund-extracts/snapshots \
            --seed-tickers config/seed_tickers.json \
            --out securities-extracts

      - name: Regenerate JSON Schemas from pydantic models
        run: |
          nix develop -c python -m pipeline.schemas

      - name: Copy security schema into securities-extracts
        run: |
          mkdir -p securities-extracts/schemas
          cp schemas/security.json securities-extracts/schemas/

      - name: Inspect registry diff
        run: |
          cd securities-extracts
          echo "Total records: $(ls by_cik/ | wc -l)"
          echo "Ticker index: $(jq 'length' by_ticker.json) entries"
          echo
          echo "Changes vs HEAD:"
          git status --short by_cik/ by_ticker.json schemas/ | head -20

      - name: Commit and push to securities-extracts
        run: |
          cd securities-extracts
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add by_cik/ by_ticker.json schemas/
          if git diff --cached --quiet; then
            echo "No changes to commit to securities-extracts"
          else
            git commit -m "Update securities registry $(date -u +%Y-%m-%d)"
            git push
          fi
